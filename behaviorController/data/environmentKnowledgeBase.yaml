    pre_gesture_message_english: "Hello and thank you for visiting the Upanzi DEC. I'm your guide. In this tour, you will be the citizen protagonist"
    pre_gesture_message_isizulu: "No message in isiZulu"
    pre_gesture_message_kinyarwanda: "Murakazaneza muri laboratwari ya robotikisi muri kaneji meloni iniverisite yafurika"
    post_gesture_message_english: "Together, we'll explore how Upanzi's open-source digital solutions make everyday services easier and more secure. Feel free to ask questions as we go along"
    post_gesture_message_isizulu: "No message in isiZulu"
    post_gesture_message_kinyarwanda: "Ngiye kubatemberezaho gato, nizereko muribuze kuryoherwa"
    cultural_knowledge: ["SymbolicShapeRespect", "BowExtentRespect"]

