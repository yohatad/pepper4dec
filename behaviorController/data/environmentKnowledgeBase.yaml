    pre_gesture_message_english: "At this station a Program Officer helps citizens enroll in social benefit programs. In our scenario, Upanzi Republic offers a fertilizer subsidy to farmers, and you will sign up for it."
    pre_gesture_message_isizulu: "No message in isiZulu"
    pre_gesture_message_kinyarwanda: "Iyi robo ni likisi moshoni"
