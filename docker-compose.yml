version: '3.8'

services:
  pepper4dec:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_CUDA: ${USE_CUDA:-0}
    image: pepper4dec:latest
    container_name: pepper4dec
    hostname: pepper4dec
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=42
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - ./:/home/pepper/ros2_ws/src/pepper4dec
      - pepper4dec-models:/home/pepper/ros2_ws/src/pepper4dec/dec_system/*/models
      - pepper4dec-data:/home/pepper/ros2_ws/src/pepper4dec/dec_system/*/data
    networks:
      - pepper4dec-net
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
    ports:
      - "6080:6080"  # NoVNC (if needed)
      - "8888:8888"  # Jupyter (if needed)
    command: /bin/bash -c "source /opt/pepper4dec_setup.sh && ros2 launch dec_launch rtabmap_realsense.launch.py"

  # Optional: RViz2 visualization container
  pepper4dec-viz:
    build:
      context: .
      dockerfile: Dockerfile
    image: pepper4dec:latest
    container_name: pepper4dec-viz
    hostname: pepper4dec-viz
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=42
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    volumes:
      - ./:/home/pepper/ros2_ws/src/pepper4dec
      - /tmp/.X11-unix:/tmp/.X11-unix
    networks:
      - pepper4dec-net
    depends_on:
      - pepper4dec
    command: /bin/bash -c "source /opt/pepper4dec_setup.sh && rviz2"

networks:
  pepper4dec-net:
    driver: bridge

volumes:
  pepper4dec-models:
  pepper4dec-data: