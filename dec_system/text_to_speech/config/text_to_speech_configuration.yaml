# Text-to-Speech Configuration

# Synthesis + playback backend:
#   "naoqi_ros"          - Pepper's on-board ALTextToSpeech (no extra deps)
#   "kokoro_local"       - Kokoro-82M synthesised locally, laptop speakers
#   "kokoro_pepper"      - Kokoro-82M synthesised locally, Pepper's speakers
#   "elevenlabs_local"   - ElevenLabs API synthesised, laptop speakers
#   "elevenlabs_pepper"  - ElevenLabs API synthesised, Pepper's speakers
engine: "kokoro_pepper"

# Playback method for *_pepper backends:
#   "file"   - naoqi_driver SCPs WAV to robot, plays via ALAudioPlayer (full feedback)
#              Requires passwordless SSH key access from driver machine to robot.
#   "stream" - Raw PCM chunks via send_audio_buffer / ALAudioDevice (no SCP needed)
playback_method: "stream"

# naoqi_ros backend settings
naoqi_speech_topic: "/speech"
chars_per_second: 12.0
speech_padding_s: 0.5

# Kokoro backends settings
voice: "af_bella"
sample_rate: 24000
output_device: -1

# ElevenLabs backend settings
elevenlabs_api_key: "sk_9dfe98dd86795619e7c388092d2cddf88ce2aed06f92b46f"
elevenlabs_voice_id: "EXAVITQu4vr4xnSDxMaL"   # Rachel (default)
elevenlabs_model: "eleven_turbo_v2_5"           # fastest model; eleven_multilingual_v2 for more languages

# Stream volume multiplier (kokoro_pepper / elevenlabs_pepper with playback_method=stream)
# 1.0 = unity; clips at ±32767. Try 1.5–3.0 to boost Kokoro volume on Pepper.
stream_volume: 2.0

# Barge-in detection settings
barge_in_threshold: 0.85
barge_in_chunks: 3
