  9:
    robot_location_description: "Pepper's ending location"
    robot_location_pose:
      x: 4.0
      y: 6.8
      theta: 100.0
    gesture_target:
      x: 0.0
      y: 0.0
      z: 0.0
    gesture_message_english: "Thank you for joining us today and accepting to play the role of citizen protagonist. Overall, the tour painted a comprehensive picture of the Upanzi Network's approach: building interoperable Digital Public Infrastructure that is open-source and scalable, while simultaneously investing in the governance, security, and capacity required to make that infrastructure impactful. You have seen how a citizen's single digital identity threads through various services – a powerful illustration of the whole being greater than the sum of its parts. By the end of this immersive experience, it's evident that digital public goods do not stand alone; they interlock like pieces of a puzzle, supported by robust connectivity and safeguarded by vigilant cybersecurity measures, all driven forward by skilled and conscientious individuals. Hope you enjoyed the tour, goodbye."
    cultural_knowledge: ["IconicShape"]
