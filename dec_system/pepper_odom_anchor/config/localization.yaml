robot_localization:
  ros__parameters:
    # Initial position (meters and radians)
    initial_x: 0.0
    initial_y: 0.0
    initial_theta: 0.0  # radians (0.0 = facing forward)
    
    # Topics
    odom_topic: "/pepper_odom_filtered"
    pose_topic: "/robot_localization/pose"
    
    # Publish rate (Hz)
    publish_rate: 10.0