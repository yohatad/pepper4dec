# Environment Knowledge Base
tour_specification: [1, 2, 3, 4, 5]

locations:
  1:
    robot_location_description: "Pepper's starting location"
    robot_location_pose:
      x: 4.4
      y: 7.8
      theta: 270.0
    gesture_target:
      x: 0.0
      y: 0.0
      z: 0.0
    pre_gesture_message_english: "Welcome the the robotics lab at Carnegie Mellon University Africa."
    pre_gesture_message_kinyarwanda: "Murakazaneza muri laboratwari ya robotikisi muri kaneji meloni iniverisite yafurika"
