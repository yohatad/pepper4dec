# LLM Settings
llm:
  base_url: http://127.0.0.1:8080/v1/
  model: meta-llama/Llama-3.1-8B-Instruct

# Embedding Model
embedding:
  model: all-MiniLM-L6-v2

# Search Settings
search:
  similarity_threshold: 0.15
  top_k: 5

# Data Settings
data:
  default_path: ./data/upanzi_data.json
debug:
  verbose: true
