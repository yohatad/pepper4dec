
# LLM Settings
llm:
  base_url: https://api.groq.com/openai/v1
  api_key: your-api-key-here
  model: llama-3.1-8b-instant

# ChromaDB Settings (embedded mode - local storage path)
chroma:
  path: ./chroma_data

# Embedding Model
embedding:
  model: all-MiniLM-L6-v2

# Search Settings
search:
  similarity_threshold: 0.15
  top_k: 5