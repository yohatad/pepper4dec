# LLM Settings
llm:
  base_url: https://api.deepseek.com/v1
  model: deepseek-chat

# ChromaDB Settings (embedded mode - local storage path)
chroma:
  path: ./data/chroma_data

# Embedding Model
embedding:
  model: all-MiniLM-L6-v2

# Search Settings
search:
  similarity_threshold: 0.15
  top_k: 5

# Data Settings
data:
  default_path: ./data/upanzi_data.json
debug:
  verbose: true
