slam_toolbox:
  ros__parameters:
    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ROS Parameters
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_map_saver: true
    mode: mapping

    # CRITICAL RANGE PARAMETERS - CHANGED THESE:
    max_laser_range: 12.0                        # ← ADDED: Match YDLidar range
    minimum_time_interval: 0.5                   # ← ADDED
    transform_timeout: 0.2                       # ← ADDED
    
    # General Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 15.0      # ← CHANGED from 10.0
    link_match_minimum_response_fine: 0.1  
    link_scan_maximum_distance: 10.0             # ← CHANGED from 1.5 (THIS WAS THE PROBLEM!)
    loop_search_maximum_distance: 8.0            # ← CHANGED from 3.0 for larger areas
    do_loop_closing: true 
    loop_match_minimum_chain_size: 10           
    loop_match_maximum_variance_coarse: 3.0  
    loop_match_minimum_response_coarse: 0.35    
    loop_match_minimum_response_fine: 0.45

    # Correlation Parameters - Tuned for YDLidar
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1 

    # Loop Closure Parameters
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Scan Matcher Parameters
    distance_variance_penalty: 0.5      
    angle_variance_penalty: 1.0    
    fine_search_angle_offset: 0.00349     
    coarse_search_angle_offset: 0.349   
    coarse_angle_resolution: 0.0349        
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
    
    # Map settings
    resolution: 0.05                             # ← ADDED: 5cm


    # ===== ADD THESE OCCUPANCY GRID PARAMETERS =====
    
    # Stack size for occupancy grid
    stack_size_to_use: 40000000  # 40MB stack
    
    # Occupancy grid settings - CRITICAL FOR FULL RANGE MAPPING
    map_update_interval: 2.0
    resolution: 0.05
    
    # Enable processing of all scan points for map
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    
    # CRITICAL: Don't filter out far points when building occupancy grid
    laser_sample_step: 1  # Use every laser point (1 = all points)
    laser_max_range: 16.0  # Match your LiDAR
    laser_min_range: 0.1
    
    # Ensure map updates with full scan data
    occupancy_grid_max_range: 16.0  # NEW - extend occupancy grid range
    
    # Don't be too conservative with obstacles
    hit_probability: 0.7
    miss_probability: 0.4