name: CI

on:
  push:
    branches: [main, cpp]
  pull_request:
    branches: [main, cpp]

jobs:
  build-and-lint:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-perception-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          path: src/pepper4dec

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            build-essential cmake git \
            python3-colcon-common-extensions python3-vcstool python3-rosdep python3-pip \
            ros-humble-nav2-bringup ros-humble-nav2-map-server ros-humble-nav2-amcl \
            ros-humble-nav2-controller ros-humble-nav2-planner ros-humble-nav2-behaviors \
            ros-humble-nav2-bt-navigator ros-humble-nav2-lifecycle-manager ros-humble-nav2-costmap-2d \
            ros-humble-slam-toolbox ros-humble-rtabmap-ros ros-humble-realsense2-camera \
            ros-humble-message-filters ros-humble-cv-bridge \
            ros-humble-image-transport ros-humble-nav2-msgs ros-humble-geometry-msgs \
            ros-humble-sensor-msgs ros-humble-std-msgs ros-humble-std-srvs \
            ros-humble-robot-state-publisher ros-humble-joint-state-publisher \
            ros-humble-naoqi-libqi ros-humble-naoqi-libqicore \
            ros-humble-pepper-meshes ros-humble-nao-meshes \
            libyaml-cpp-dev libopencv-dev libomp-dev libeigen3-dev libboost-all-dev \
            libgl1-mesa-glx libglib2.0-0 libudev-dev libusb-1.0-0

      - name: Clone sibling ROS2 dependencies
        run: |
          git clone https://github.com/yohatad/naoqi_bridge_msgs2.git src/naoqi_bridge_msgs
          git clone https://github.com/yohatad/naoqi_driver2.git src/naoqi_driver2
          git clone https://github.com/ros-naoqi/libqi.git -b ros2 src/naoqi_libqi
          git clone https://github.com/ros-naoqi/libqicore.git -b ros2 src/naoqi_libqicore
          git clone https://github.com/ros-naoqi/nao_meshes2.git src/nao_meshes
          git clone https://github.com/ros-naoqi/pepper_meshes2.git src/pepper_meshes
          git clone https://github.com/BehaviorTree/BehaviorTree.CPP.git src/BehaviorTree.CPP
          git clone https://github.com/BehaviorTree/BehaviorTree.ROS2.git src/BehaviorTree.ROS2

      - name: rosdep install
        run: |
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      - name: colcon build
        run: |
          . /opt/ros/humble/setup.sh
          colcon build --symlink-install

      # Runs linters, gtest unit tests (kinematics, behavior utilities,
      # ByteTracker), and launch tests (lifecycle, bag replay). The bag-replay
      # test self-skips here: the ONNX model is git-ignored and absent in CI.
      - name: colcon test (lint + unit + launch tests)
        run: |
          . /opt/ros/humble/setup.sh
          . install/setup.sh
          colcon test
          colcon test-result --verbose
